<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Controls</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Roboto, sans-serif;
        }

        body {
            background-color: #dbdbdb;
            line-height: 1.6;
            font-size: 16px;
            color: #333;
        }

        h1 {
            padding: 5px 15px;
            font-size: 28px;
            background-color: #585858;
            color: #fff;
        }

        h2 {
            font-size: 20px;
            padding-inline: 5px;
            margin-inline: 10px;
            margin-top: 20px;
            border-bottom: 1px solid #333;
        }

        button {
            background-color: #fff;
            color: #333;
            width: 80px;
            height: 70px;
            border: none;
            cursor: pointer;
            margin-inline: auto;
            margin-top: 5px;
            border-radius: 5px;
        }

        button img {
            width: 22px;
            height: 22px;
            opacity: .8;
        }

        .button-group {
            display: flex;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            max-width: 400px;
            column-gap: 10px;
            margin-inline: 10px;
        }
    </style>
</head>

<body>
    <h1>Controller</h1>

    <div id="settings-panel"
        style="background-color: #e5e5e5; display: inline-flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 10px 15px; border-bottom: 2px solid #ccc; font-size: 14px; width: calc(100% - 30px);">
        <div style="display: flex; align-items: center; gap: 5px; margin-right: 20px;">
            <span id="connection-indicator"
                style="width: 10px; height: 10px; border-radius: 50%; background-color: #888; display: inline-block;"></span>
            <span id="connection-text" style="color: #555; font-weight: bold; font-size: 13px;">Checking server
                connection...</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; flex-grow: 1; max-width: 550px; flex-wrap: wrap;">
            <label for="server-url" style="white-space: nowrap; color: #555; font-weight: bold;">Server:</label>
            <input type="text" id="server-url"
                style="padding: 4px 8px; border: 1px solid #aaa; border-radius: 4px; flex-grow: 1; min-width: 120px;"
                placeholder="e.g. http://localhost:6969">

            <label for="session-url"
                style="white-space: nowrap; color: #555; font-weight: bold; margin-left: 10px;">Session ID:</label>
            <input type="text" id="session-url"
                style="padding: 4px 8px; border: 1px solid #aaa; border-radius: 4px; width: 90px; text-transform: uppercase;"
                placeholder="X9F2A1">

            <button id="save-settings"
                style="width: auto; height: auto; padding: 4px 12px; margin: 0; background-color: #585858; color: white; border-radius: 4px; margin-left: 5px;">Save</button>
        </div>
    </div>

    <h2>Beamer</h2>
    <div class="category">
        <div class="button-grid">
            <button id="beamer-rewind">
                <img src="icons/backward.png" alt="Rewind">
            </button>
            <button id="beamer-pause">
                <img src="icons/pause.png" alt="Pause">
            </button>
            <button id="beamer-play">
                <img src="icons/play.png" alt="Play">
            </button>
            <button id="beamer-skip">
                <img src="icons/forward.png" alt="Skip">
            </button>

            <button id="beamer-volDown">
                <img src="icons/volDown.png" alt="Volume down">
            </button>
            <button id="beamer-mute">
                <img src="icons/mute.png" alt="Mute">
            </button>
            <button id="beamer-unmute">
                <img src="icons/unmute.png" alt="Unmute">
            </button>
            <button id="beamer-volUp">
                <img src="icons/volUp.png" alt="Volume up">
            </button>

            <button id="beamer-fullscreen">
                <img src="icons/fullscreen.png" alt="Fullscreen">
            </button>
            <button id="beamer-smallscreen">
                <img src="icons/smallscreen.png" alt="Smallscreen">
            </button>
        </div>
    </div>

    <h2>Laptop</h2>
    <div class="category">
        <div class="button-grid">
            <button id="laptop-rewind">
                <img src="icons/backward.png" alt="Rewind">
            </button>
            <button id="laptop-pause">
                <img src="icons/pause.png" alt="Pause">
            </button>
            <button id="laptop-play">
                <img src="icons/play.png" alt="Play">
            </button>
            <button id="laptop-skip">
                <img src="icons/forward.png" alt="Skip">
            </button>

            <button id="laptop-volDown">
                <img src="icons/volDown.png" alt="Volume down">
            </button>
            <button id="laptop-mute">
                <img src="icons/mute.png" alt="Mute">
            </button>
            <button id="laptop-unmute">
                <img src="icons/unmute.png" alt="Unmute">
            </button>
            <button id="laptop-volUp">
                <img src="icons/volUp.png" alt="Volume up">
            </button>

            <button id="laptop-fullscreen">
                <img src="icons/fullscreen.png" alt="Fullscreen">
            </button>
            <button id="laptop-smallscreen">
                <img src="icons/smallscreen.png" alt="Smallscreen">
            </button>
        </div>
    </div>
    </div>

</body>
<script src="app.js"></script>

</html>
